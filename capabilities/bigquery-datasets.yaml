naftiko: 1.0.0-alpha2
info:
  label: Google BigQuery API — Datasets
  description: 'Google BigQuery API — Datasets. 6 operations. Lead operation: Google BigQuery List datasets. Self-contained
    Naftiko capability covering one Google Bigquery business surface.'
  tags:
  - Google Bigquery
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_BIGQUERY_API_KEY: GOOGLE_BIGQUERY_API_KEY
capability:
  consumes:
  - type: http
    namespace: bigquery-datasets
    baseUri: https://bigquery.googleapis.com/bigquery/v2
    description: Google BigQuery API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-datasets
      path: /projects/{projectId}/datasets
      operations:
      - name: listdatasets
        method: GET
        description: Google BigQuery List datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: all
          in: query
          type: boolean
          description: Whether to list all datasets, including hidden ones
        - name: filter
          in: query
          type: string
          description: Filter expression for filtering datasets by label
      - name: insertdataset
        method: POST
        description: Google BigQuery Create a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-datasets-datasetId
      path: /projects/{projectId}/datasets/{datasetId}
      operations:
      - name: getdataset
        method: GET
        description: Google BigQuery Get dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchdataset
        method: PATCH
        description: Google BigQuery Partially update dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updatedataset
        method: PUT
        description: Google BigQuery Update dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedataset
        method: DELETE
        description: Google BigQuery Delete dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deleteContents
          in: query
          type: boolean
          description: If true, delete all the tables in the dataset
    authentication:
      type: bearer
      token: '{{env.GOOGLE_BIGQUERY_API_KEY}}'
  exposes:
  - type: rest
    namespace: bigquery-datasets-rest
    port: 8080
    description: REST adapter for Google BigQuery API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/datasets
      name: projects-projectid-datasets
      description: REST surface for projects-projectId-datasets.
      operations:
      - method: GET
        name: listdatasets
        description: Google BigQuery List datasets
        call: bigquery-datasets.listdatasets
        with:
          all: rest.all
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: insertdataset
        description: Google BigQuery Create a dataset
        call: bigquery-datasets.insertdataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/datasets/{datasetid}
      name: projects-projectid-datasets-datasetid
      description: REST surface for projects-projectId-datasets-datasetId.
      operations:
      - method: GET
        name: getdataset
        description: Google BigQuery Get dataset
        call: bigquery-datasets.getdataset
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchdataset
        description: Google BigQuery Partially update dataset
        call: bigquery-datasets.patchdataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatedataset
        description: Google BigQuery Update dataset
        call: bigquery-datasets.updatedataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedataset
        description: Google BigQuery Delete dataset
        call: bigquery-datasets.deletedataset
        with:
          deleteContents: rest.deleteContents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bigquery-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google BigQuery API — Datasets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: google-bigquery-list-datasets
      description: Google BigQuery List datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bigquery-datasets.listdatasets
      with:
        all: tools.all
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: google-bigquery-create-dataset
      description: Google BigQuery Create a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: bigquery-datasets.insertdataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: google-bigquery-get-dataset
      description: Google BigQuery Get dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bigquery-datasets.getdataset
      outputParameters:
      - type: object
        mapping: $.
    - name: google-bigquery-partially-update-dataset
      description: Google BigQuery Partially update dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bigquery-datasets.patchdataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: google-bigquery-update-dataset
      description: Google BigQuery Update dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: bigquery-datasets.updatedataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: google-bigquery-delete-dataset
      description: Google BigQuery Delete dataset
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: bigquery-datasets.deletedataset
      with:
        deleteContents: tools.deleteContents
      outputParameters:
      - type: object
        mapping: $.
