specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Google BigQuery
providerId: google-bigquery
publisherName: Google LLC
serviceCategory: Data Warehouse / Analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Data Warehouse
  - Analytics
  - Google Cloud
  - SQL
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for BigQuery: separate compute (on-demand TB-scanned or capacity slot-hours)
  and storage (active vs long-term, logical vs physical) meters, billed continuously through Google Cloud
  Billing. Detailed export to BigQuery itself is the canonical visibility surface.'
sources:
  - https://cloud.google.com/bigquery/pricing
  - https://cloud.google.com/billing/docs/how-to/export-data-bigquery
  - https://cloud.google.com/bigquery/docs/information-schema-jobs
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: BigQuery
  ServiceCategory: Database / Data Warehouse
  ProviderName: Google Cloud
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: query_bytes_processed
    description: Bytes processed by on-demand SQL queries
    unit: TB
    aggregation: sum
    dimensions:
      - project
      - region
      - user
      - job_id
  - name: slot_hours
    description: Slot-hours consumed under a capacity reservation (Standard/Enterprise/Enterprise Plus)
    unit: slot-hour
    aggregation: sum
    dimensions:
      - reservation
      - edition
      - region
  - name: active_storage
    description: Active table storage (modified within 90 days) - logical or physical
    unit: GB-month
    aggregation: sum
    dimensions:
      - dataset
      - region
      - billing_model
  - name: long_term_storage
    description: Long-term table storage (unmodified 90+ days)
    unit: GB-month
    aggregation: sum
    dimensions:
      - dataset
      - region
      - billing_model
  - name: streaming_inserts
    description: Bytes ingested via legacy streaming insert API
    unit: GB
    aggregation: sum
    dimensions:
      - dataset
      - region
  - name: storage_write_api
    description: Bytes ingested via Storage Write API
    unit: GB
    aggregation: sum
    dimensions:
      - dataset
      - region
  - name: storage_read_api
    description: Bytes read via Storage Read API
    unit: GB
    aggregation: sum
    dimensions:
      - dataset
      - region
  - name: bi_engine_capacity
    description: BI Engine reserved memory
    unit: GB-month
    aggregation: max
    dimensions:
      - region
apis:
  - name: BigQuery API
    baseURL: https://bigquery.googleapis.com
    serviceName: BigQuery API
    serviceCategory: Data Warehouse
  - name: BigQuery Storage Read API
    baseURL: https://bigquerystorage.googleapis.com
    serviceName: BigQuery Storage API
    serviceCategory: Data Warehouse
  - name: BigQuery Reservation API
    baseURL: https://bigqueryreservation.googleapis.com
    serviceName: BigQuery Reservation API
    serviceCategory: Data Warehouse
  - name: BigQuery Connection API
    baseURL: https://bigqueryconnection.googleapis.com
    serviceName: BigQuery Connection API
    serviceCategory: Data Warehouse
principles:
  - name: Visibility
    description: Enable Cloud Billing detailed export to BigQuery and query INFORMATION_SCHEMA.JOBS_BY_PROJECT
      for query-level cost attribution. Use the BigQuery Admin Resource Charts dashboard to see slot utilization
      per reservation.
  - name: Allocation
    description: Tag jobs with labels (team, application, environment) and pivot the billing export by
      label; use reservations + assignments to chargeback capacity to specific projects/folders.
  - name: Optimization
    description: Partition and cluster large tables to reduce bytes scanned; use materialized views and
      BI Engine for hot queries; switch from on-demand to a capacity reservation when sustained slot consumption
      makes it cheaper; commit 1y/3y for additional discount; switch eligible datasets to physical storage
      billing when compression ratio is high.
  - name: Accountability
    description: Set per-project query bytes-billed daily caps as a hard guardrail; configure Cloud Billing
      budget alerts at 50/80/100% per project; review the top-spending queries weekly via INFORMATION_SCHEMA.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
